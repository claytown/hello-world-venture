services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: hello
      POSTGRES_PASSWORD: hello
      POSTGRES_DB: hello_world
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hello -d hello_world"]
      interval: 3s
      timeout: 3s
      retries: 10

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://hello:hello@db:5432/hello_world
      PORT: "3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
